<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f9f9f7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)" />
  <title>Fuel · Meal Planner</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Fuel" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- Onboarding (hidden after first run) -->
  <div id="onboarding" hidden>
    <div class="inner">
      <div class="ob-logo">🔥</div>
      <div class="ob-title">Fuel</div>
      <div class="ob-sub">Your Trader Joe's meal planner. High protein, under budget, no thinking required.</div>

      <div class="ob-section">About you</div>
      <div class="field-row">
        <div class="field"><label>Sex</label>
          <select id="ob-sex"><option value="male">Male</option><option value="female">Female</option></select>
        </div>
        <div class="field"><label>Age</label><input id="ob-age" type="number" inputmode="numeric" placeholder="28" /></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Height</label>
          <div class="field-row" style="gap:6px">
            <input id="ob-ft" type="number" inputmode="numeric" placeholder="5" style="width:100%" />
            <input id="ob-in" type="number" inputmode="numeric" placeholder="10" style="width:100%" />
          </div>
          <div class="hint">feet / inches</div>
        </div>
        <div class="field"><label>Weight (lb)</label><input id="ob-weight" type="number" inputmode="decimal" placeholder="185" /></div>
      </div>
      <div class="field"><label>Activity level</label>
        <select id="ob-activity">
          <option value="sedentary">Sedentary — desk job, little exercise</option>
          <option value="light">Light — gym 1–3×/week</option>
          <option value="moderate" selected>Moderate — gym 3–5×/week</option>
          <option value="very">Very active — hard training 6–7×/week</option>
        </select>
      </div>

      <div class="ob-section">Goal</div>
      <div class="field-row">
        <div class="field"><label>Weight to lose (lb)</label><input id="ob-loss" type="number" inputmode="numeric" value="10" /></div>
        <div class="field"><label>Daily deficit (kcal)</label>
          <select id="ob-deficit">
            <option value="250">250 — gentle (~0.5 lb/wk)</option>
            <option value="500" selected>500 — steady (~1 lb/wk)</option>
            <option value="750">750 — aggressive (~1.5 lb/wk)</option>
          </select>
        </div>
      </div>

      <div class="ob-section">Preferences</div>
      <div class="field"><label>Usual breakfast</label>
        <select id="ob-breakfast">
          <option value="latte" selected>Just a latte</option>
          <option value="yogurt-bowl">Greek yogurt bowl</option>
          <option value="egg-white-bites">Egg white bites</option>
          <option value="bagel-breakfast">Bagel</option>
        </select>
        <div class="hint">You can swap any single day later — bagel days welcome</div>
      </div>
      <div class="field"><label>Treats per week (Prime Bites etc.)</label>
        <select id="ob-treats">
          <option value="0">None</option>
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="5">5</option>
        </select>
      </div>

      <div class="budget-preview" id="ob-preview" hidden></div>
      <button class="btn primary" style="width:100%; padding:15px" data-action="ob-save">Create my plan →</button>
    </div>
  </div>

  <!-- Today -->
  <section class="view active" id="view-today"></section>

  <!-- Plan -->
  <section class="view" id="view-plan"></section>

  <!-- Shop -->
  <section class="view" id="view-shop"></section>

  <!-- Progress -->
  <section class="view" id="view-progress"></section>

  <!-- More -->
  <section class="view" id="view-more"></section>

  <!-- Bottom sheet -->
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div class="sheet" id="sheet"></div>

  <!-- Nav -->
  <nav class="nav" id="nav">
    <button data-tab="today" class="on">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2.5v2.5M12 19v2.5M2.5 12H5M19 12h2.5M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/></svg>
      Today
    </button>
    <button data-tab="plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3.5" y="5" width="17" height="15.5" rx="3"/><path d="M8 2.8v4M16 2.8v4M3.5 10.5h17"/></svg>
      Plan
    </button>
    <button data-tab="shop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h2.2l2.2 11.5a1.6 1.6 0 0 0 1.6 1.3h8.6a1.6 1.6 0 0 0 1.6-1.2L21 8H6"/><circle cx="9.5" cy="20" r="1.4"/><circle cx="17.5" cy="20" r="1.4"/></svg>
      Shop
    </button>
    <button data-tab="progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 20.5V14M10 20.5V9M16.5 20.5V12M21 4.5l-6 5-4-3-6.5 5.5"/></svg>
      Progress
    </button>
    <button data-tab="more">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.09a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      More
    </button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
