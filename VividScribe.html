<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>VividScribe – The Next-Gen YouTube Transcript Hero!</title>
  <link href="https://fonts.googleapis.com/css?family=Bangers|Quicksand:700,400&display=swap" rel="stylesheet">
  <style>
    html,body{height:100%;margin:0;padding:0;}
    body {
      min-height: 100vh;
      height: 100%;
      font-family: 'Quicksand', Arial, sans-serif;
      background: linear-gradient(125deg, #f7971e, #5be1ff 50%, #8a6cff 100%);
      background-size: 300% 300%;
      animation: animatedBG 14s linear infinite alternate;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    @keyframes animatedBG {
      0% {background-position:0% 70%;}
      100%{background-position:100% 10%;}
    }
    .container {
      background: rgba(255,255,255,0.73);
      backdrop-filter: blur(20px) saturate(1.25);
      box-shadow: 0 8px 80px 0 rgba(42, 65, 190, 0.15), 0 2px 48px #6d88ee42;
      border-radius: 34px;
      padding: 46px 36px 39px 36px;
      width: 100%;
      max-width: 620px;
      text-align: center;
      margin: 3vw auto;
      position: relative;
      animation: riseUp 1.15s cubic-bezier(.42,0,.58,1);
    }
    @media (max-width: 900px) {
      .container {max-width: 97vw;padding:7vw 2vw 10vw 2vw;}
    }
    @media (max-width:520px){
      .container{padding:7vw 2vw 10vw 2vw;}
    }
    @media (min-width:900px){
      body{padding-top:3vh;padding-bottom:5vh;}
      .container{
        max-width: 730px;
        min-height: 440px;
        padding:64px 58px 58px 58px;
      }
    }
    .logo-wrap {margin-bottom: 12px;}
    .hero-logo {
      width:90px; height:90px; animation: heroPop 1.4s cubic-bezier(.5,.1,.5,1.6) both 0.4s;
      filter: drop-shadow(0 2px 14px #5be1ff50);
    }
    @keyframes heroPop {
      0%{transform:scale(0.1) rotate(-35deg);}
      70%{transform:scale(1.12) rotate(7deg);}
      90%{transform:scale(0.93) rotate(-4deg);}
      100%{transform:scale(1) rotate(0);}
    }
    .sparkleX {
      animation: sparkle-spin 1.8s linear infinite;
      transform-origin: 50% 30%;
    }
    @keyframes sparkle-spin {0%{transform:rotate(0);}100%{transform:rotate(360deg);}}
    .hero-name {
      font-size: 3rem;
      font-family: 'Bangers', Quicksand, cursive;
      color: #2e4cff;
      line-height: 1.16em;
      letter-spacing:.08em;
      text-shadow:0 4px 22px #fff, 0 2px 0 #5be1ffad;
      animation: fadeInDown 1s 0.59s both;
    }
    .subtitle {font-size:1.21rem; color:#3730da; margin-bottom: 11px; font-weight:700; letter-spacing:.07em;animation: fadeInDown 1s .8s both;}
    .persona {color:#43bbf7; font-size:.99rem; margin-bottom:17px;opacity:.92; font-style:italic; animation: fadeInLeft 1.1s 1.05s both;}
    @keyframes fadeInDown {0% {opacity:0; transform:translateY(-30px);}100%{opacity:1; transform:translateY(0);}}
    @keyframes fadeInLeft {0%{opacity:0; transform:translateX(-36px);}100%{opacity:1; transform:translateX(0);}}
    input[type="url"]{width:100%;padding:16px;margin-bottom:8px;border:none;outline:none;border-radius:17px;background:#f4f8fa;font-size:1.13em; font-family: inherit; box-shadow: 0 2px 8px #5be1ff1a;transition: background 0.2s;}
    input[type="url"]:focus {background:#fff8fa;}
    .act-bar {display: flex; gap: 17px; align-items: center; justify-content: center; margin-bottom: 8px; margin-top: 8px;}
    .superhero-btn, .voice-btn {padding:0; width:60px; height:60px; border-radius:100%;background: radial-gradient(ellipse at 30% 100%,#2e4cff 24%,#5be1ff 70%,#fa77aa 100%); border: none;color: white; font-size:2.3em; font-family: Bangers, Quicksand, sans-serif; box-shadow: 0 2px 15px #2e4cff37, 0 7px 18px #5be1ff23;cursor:pointer;transition: box-shadow .23s,transform .16s;position: relative; z-index:5; animation: pulseHero 2.1s infinite alternate;}
    .voice-btn {font-size:1.74em;width:52px;height:52px;animation:pulseVoice 2.1s 1.21s infinite alternate;background:#5be1ff;}
    .superhero-btn:active, .voice-btn:active{box-shadow: 0 0 48px #2e4cffb0,0 2px 0 #fff6;transform:scale(0.97);}
    @keyframes pulseHero {0%{box-shadow:0 0px 16px #8c6cff27,0 0 0 #fff2;}100%{box-shadow:0 0px 32px #2e4cff69,0 4px 0 #fff3;}}
    @keyframes pulseVoice {0%{box-shadow:0 0px 8px #5be1ff80;}100%{box-shadow:0 0px 28px #5be1ffc9;}}
    .flip-card {perspective:1150px;width:100%; min-height:130px;margin-top:14px;}
    .flip-card-inner{transition:transform .7s cubic-bezier(.4,2.34,.3,.9);transform-style:preserve-3d;position:relative;min-height:130px;}
    .flipped .flip-card-inner{transform:rotateY(180deg);}
    .flip-card-front, .flip-card-back {position: absolute;width: 100%;min-height:130px;backface-visibility:hidden;left:0;top:0;}
    .flip-card-front {z-index:2;}
    .flip-card-back {transform: rotateY(180deg);z-index:1;}
    .transcript {white-space: pre-wrap;color: #16384b;font-size:1.09rem;margin-top:16px;text-align:left;min-height:110px;font-family:'Quicksand', Arial, sans-serif;line-height:1.67em;background:rgba(255,255,255,0.32);border-radius: 13px;padding: 1.07em;box-shadow:0 2px 18px #5be1ff23;animation: fadeInUp 1.1s cubic-bezier(.42,0,.58,1);}
    @keyframes fadeInUp {0% {opacity:0; transform:translateY(28px);}100%{opacity:1; transform:translateY(0);}}
    .loading {color: #2e4cff;font-size:1.11rem;margin:17px 0;text-align:center;}
    .error{color:#b3006d;font-weight:700;}
    .success{color: #42c47e;font-weight: 600;}
    .voice-panel {margin-top:13px;padding:10px 0 5px 0; color:#2e4cff;font-size:.98em;opacity:.83;display:none; align-items: center;justify-content:center;gap:11px; animation: fadeInDown 1.1s both;}
    .voice-panel.active{display:flex;}
    .voice-panel .success{margin-left:9px;}
    footer {margin-top: 48px;font-size:1.08em;color: #2e4cff;opacity:.88;letter-spacing:.03em;user-select:none;}
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <!-- Fun vivid logo (sparkle, chat, play) -->
      <svg class="hero-logo" viewBox="0 0 64 64">
        <ellipse cx="32" cy="32" rx="29" ry="28" fill="#d4ecff" />
        <ellipse cx="32" cy="25" rx="21" ry="16" fill="#fff"/>
        <rect x="16" y="15" width="32" height="22" rx="10" fill="#2e4cff"/>
        <polygon points="32,20 32,28 42,24" fill="#fff"/>
        <ellipse cx="45" cy="22" rx="2.7" ry="2.3" fill="#5be1ff"/>
        <ellipse cx="16" cy="28" rx="3" ry="3" fill="#fdfcff"/>
        <g class="sparkleX">
          <circle cx="51" cy="9" r="2.2" fill="#fdf438" />
          <rect x="54" y="11.8" width="0.7" height="4.0" rx="0.29" fill="#fdf438" transform="rotate(20 54.4 13.8)"/>
          <rect x="49" y="5.6" width="0.7" height="2.6" rx="0.25" fill="#fdf438" transform="rotate(-3 49.1 7)"/>
        </g>
      </svg>
    </div>
    <div class="hero-name">VividScribe</div>
    <div class="subtitle">A Brighter Way to See & Hear YouTube Transcripts</div>
    <div class="persona">“Unleashing the colors of speech — one video at a time.”</div>
    <input id="yturl" type="url" placeholder="Paste YouTube link here..." required>
    <div class="act-bar">
      <button class="superhero-btn" id="fetchBtn" title="Get Transcript!">✨</button>
      <button class="voice-btn" id="voiceBtn" title="Hear Transcript" disabled>🔊</button>
    </div>
    <div class="flip-card" id="flip-card">
      <div class="flip-card-inner" id="card-inner">
        <div class="flip-card-front"></div>
        <div class="flip-card-back">
          <div id="result"></div>
        </div>
      </div>
    </div>
    <div class="voice-panel" id="voicePanel">
      <span>🎤 <strong>Listen:</strong> Your transcript will be read aloud.</span>
      <span class="success" id="voiceState"></span>
    </div>
    <footer>
      <span>🌈 VividScribe &copy; 2025 &middot; Colorful transcripts in a flash!</span>
    </footer>
  </div>
<script>
const card = document.getElementById("flip-card");
const cardInner = document.getElementById("card-inner");
let isFlipped = false;
function flip(toResult) {
  isFlipped = !!toResult;
  if (isFlipped) card.classList.add("flipped");
  else card.classList.remove("flipped");
}
const fetchBtn = document.getElementById("fetchBtn");
const voiceBtn = document.getElementById("voiceBtn");
const resultDiv = document.getElementById("result");
const voicePanel = document.getElementById("voicePanel");
const voiceState = document.getElementById("voiceState");
let lastTranscript = '';
fetchBtn.onclick = async function() {
  resultDiv.innerHTML = `<div class="loading">Fetching your vivid transcript...</div>`;
  let ytUrl = document.getElementById("yturl").value.trim();
  let match = ytUrl.match(/v=([A-Za-z0-9_-]{11})/);
  if (!match) {
    resultDiv.innerHTML = "<span class='error'>Please paste a valid YouTube URL.</span>";
    flip(true);
    voiceBtn.disabled = true;
    return;
  }
  const videoId = match[1];
  const apiKey = "ce12e3b4e7msh99df95be331d280p12cbb6jsnb8b9e4410e1f";
  const apiHost = "youtube-transcript.p.rapidapi.com";
  try {
    const response = await fetch(`https://youtube-transcript.p.rapidapi.com/transcript/${videoId}`, {
      method: "GET",
      headers: {
        "X-RapidAPI-Key": apiKey,
        "X-RapidAPI-Host": apiHost
      }
    });
    if (!response.ok) throw new Error("Could not fetch transcript.");
    const data = await response.json();
    if (data.transcript) {
      lastTranscript = data.transcript;
      resultDiv.innerHTML = `<div class="transcript">${data.transcript.replace(/</g,"&lt;")}</div>`;
      voiceBtn.disabled = false;
      voicePanel.classList.add('active');
      voiceState.textContent = "Ready!";
      flip(true);
    } else {
      voiceBtn.disabled = true;
      voicePanel.classList.remove('active');
      resultDiv.innerHTML = "<span class='error'>No transcript found for this video.</span>";
      flip(true);
    }
  } catch (err) {
    voiceBtn.disabled = true;
    voicePanel.classList.remove('active');
    resultDiv.innerHTML = "<span class='error'>Transcript could not be retrieved. (No captions or link might be wrong.)</span>";
    flip(true);
  }
};
card.onclick = function(e){ if(isFlipped && e.target.id!=='voiceBtn') flip(false); }
voiceBtn.onclick = function() {
  if (!lastTranscript) return;
  let utterance = new window.SpeechSynthesisUtterance(lastTranscript);
  let voices = speechSynthesis.getVoices();
  let v = voices.find(v=>/en.*(Male|Clear|Epic|Hero|Strong|Bold)/i.test(v.name)) || voices.find(v=>/en/i.test(v.lang));
  if (v) utterance.voice = v;
  utterance.rate = 1.09;
  utterance.pitch = 1.13;
  utterance.volume = 1;
  utterance.onstart = ()=>voiceState.textContent = "Reading!";
  utterance.onend = ()=>voiceState.textContent = "Done!";
  speechSynthesis.speak(utterance);
};
window.speechSynthesis.onvoiceschanged = ()=>{voiceBtn.title="Hear in "+(speechSynthesis.getVoices().find(v=>/en/i.test(v.lang))?.name||"Hero Voice");};
</script>
</body>
</html>
